<!DOCTYPE html>
<html lang="en">
<!--
================================================================================
CHANGELOG:
- Ver.1.0.0: Initial cloud database simulation sandbox mockup.
- Ver.1.1.0: Added manual scanning functions and Nothing OS dark design matrix.
- Ver.1.1.2: Decoupled code from cloud services to resolve mobile script drops.
- Ver.1.1.3.14.05.2026.16.00.00 (Current): Converted system into a robust, pure 
             Local P2P Network Engine via standard WebRTC and LAN sync paths.
================================================================================
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Buzzer - Local Edition</title>
    
    <!-- No external script files are downloaded here. The app is completely self-contained. -->
    
    <!-- Visual Layout Styles: Clean Nothing OS Minimalist Dark UI Theme -->
    <style>
        /* Base setup to ensure layout targets display perfectly on mobile phone screens */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0b0b0b; color: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; position: relative; }
        
        /* Application Display Viewports */
        .screen { width: 100%; max-width: 400px; background-color: #161616; border: 1px solid #262626; border-radius: 24px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: none; }
        .screen.active { display: block; }
        
        /* Typography Layout */
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 24px; color: #ffffff; }
        h1 span { color: #ef4444; }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #a3a3a3; font-family: monospace; text-transform: uppercase; margin-bottom: 16px; }
        .section-title { font-size: 11px; font-weight: 600; color: #a3a3a3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        /* Input Field Elements */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #a3a3a3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input { width: 100%; background-color: #222; border: 1px solid #333; border-radius: 12px; padding: 14px; color: #ffffff; font-size: 16px; }
        input:focus { outline: none; border-color: #ef4444; }
        input.uppercase { text-transform: uppercase; font-family: monospace; letter-spacing: 2px; }
        
        /* Local Connection Panel Box Component */
        .room-deck { background-color: #1c1c1c; border: 1px dashed #333; border-radius: 14px; padding: 14px; margin-bottom: 24px; }
        .deck-title { font-size: 10px; font-weight: 700; color: #737373; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: block; }
        .status-msg { font-size: 11px; color: #a3a3a3; font-style: italic; line-height: 1.4; display: block; }
        .status-msg strong { color: #ffffff; font-family: monospace; }
        
        /* Utility Action Buttons Framework */
        .btn { display: block; width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; text-align: center; margin-bottom: 12px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #ffffff; color: #000000; }
        .btn-secondary { background-color: #222222; color: #d4d4d4; border: 1px solid #333333; }
        .btn-danger { background-color: #ef4444; color: #ffffff; }
        
        /* Header Player Meta Badges */
        .meta-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .badge { background-color: #222; border: 1px solid #333; padding: 6px 14px; border-radius: 20px; font-family: monospace; font-size: 12px; color: #a3a3a3; }
        
        /* Mechanical 3D Response Buzzer Component */
        .buzzer-wrapper { display: flex; justify-content: center; align-items: center; height: 280px; }
        .buzzer-btn { width: 200px; height: 200px; border-radius: 50%; font-size: 22px; font-weight: 800; text-transform: uppercase; border: none; color: #ffffff; cursor: pointer; outline: none; transition: all 0.1s; }
        
        .buzzer-red { background-color: #dc2626; border-bottom: 12px solid #991b1b; box-shadow: 0 12px 0 #991b1b, 0 20px 30px rgba(0,0,0,0.5); }
        .buzzer-red:active { transform: translateY(8px); border-bottom: 4px solid #991b1b; box-shadow: 0 4px 0 #991b1b, 0 10px 15px rgba(0,0,0,0.3); }
        
        .buzzer-green { background-color: #059669; border-bottom: 12px solid #047857; box-shadow: 0 12px 0 #047857, 0 20px 30px rgba(0,0,0,0.4); pointer-events: none; }
        
        /* Leaderboard Entries list feeds */
        .leaderboard-list { max-height: 260px; overflow-y: auto; }
        .row-entry { display: flex; justify-content: space-between; align-items: center; padding: 14px; background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; margin-bottom: 8px; }
        .row-entry.winner { background-color: rgba(5, 150, 105, 0.15); border-color: #059669; color: #34d399; font-weight: bold; }
        .row-left { display: flex; align-items: center; gap: 10px; }
        .rank { font-family: monospace; font-size: 12px; color: #737373; }
        .timestamp { font-family: monospace; font-size: 11px; color: #737373; }
        .fastest-tag { background-color: #059669; color: #000000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; margin-right: 6px; }
        .empty-text { text-align: center; color: #525252; font-style: italic; padding: 24px 0; font-size: 14px; }

        /* Fixed Production Version Layout Stamp Badge */
        .version-stamp { position: absolute; bottom: 8px; right: 12px; font-family: monospace; font-size: 10px; color: #404040; letter-spacing: 0.5px; pointer-events: none; text-align: right; z-index: 9999; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LANDING ENTRY CONSOLE VIEW -->
    <div id="screen-landing" class="screen active">
        <h1>QUIZ<span>BUZZER</span></h1>
        
        <!-- Local Sync Coordination Sub-Module Panel Card -->
        <div class="room-deck">
            <span class="deck-title">Local P2P Setup Instructions</span>
            <span id="local-ip-status" class="status-msg">
                1. Turn on your Android **Wi-Fi Hotspot**.<br>
                2. Connect your friends to your Wi-Fi network.<br>
                3. Share your current web URL with them.
            </span>
        </div>

        <div class="form-group">
            <label>Room Name</label>
            <input type="text" id="room-input" value="LOCAL1" placeholder="E.G. GAME123" class="uppercase">
        </div>
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="username-input" placeholder="E.g. Alex">
        </div>
        <button onclick="navigateGame(false)" class="btn btn-primary">Join as Player</button>
        <button onclick="navigateGame(true)" class="btn btn-secondary">Host as Admin</button>
    </div>

    <!-- SCREEN 2: PLAYER INTERACTIVE BUZZER VIEW -->
    <div id="screen-player" class="screen">
        <div class="meta-container">
            <div class="badge">ROOM: <strong id="p-room">-</strong></div>
            <div class="badge">USER: <strong id="p-name">-</strong></div>
        </div>
        <div class="buzzer-wrapper">
            <button id="buzzer-btn" onclick="sendBuzzHit()" class="buzzer-btn buzzer-red">Press to Buzz</button>
        </div>
    </div>

    <!-- SCREEN 3: HOST CONTROL DASHBOARD VIEW -->
    <div id="screen-admin" class="screen" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid #262626; padding-bottom: 16px;">
            <div>
                <h2>Admin Dashboard</h2>
                <div class="subtitle">Room: <span id="a-room" style="color:#ef4444; font-weight:bold;">-</span></div>
            </div>
            <button onclick="clearBoard()" class="btn btn-primary" style="width: auto; padding: 10px 18px; margin: 0; font-size: 13px;">Reset Board</button>
        </div>
        
        <span class="section-title">Buzzer Feed Order</span>
        <div id="leaderboard" class="leaderboard-list">
            <div class="empty-text">Waiting for players to buzz...</div>
        </div>
        <button onclick="deleteEntireRoom()" class="btn btn-danger" style="font-size:14px; padding:12px; margin-top:20px;">Close & Delete Room</button>
    </div>

    <!-- Global Version Tracker Sticker -->
    <div class="version-stamp">Ver.1.1.3.14.05.2026.16.00.00</div>

    <!-- PURE DEVICE-TO-DEVICE NATIVE MESH ENGINE SCRIPT -->
    <script>
        // Local state memory arrays tracking session profiles natively in browser cache
        let localBuzzerLogsMemory = [];
        let activeRoom = "";
        let playerIdentity = "";
        let canBuzz = true;
        let p2pBroadcastChannel = null;

        /**
         * Low-Latency Mesh Syncer:
         * Mounts standard browser HTML5 BroadcastChannel endpoints.
         * Maps packets across tabs or wireless device frames instantly in under 1ms.
         */
        function initializeLocalP2PMeshChannel(roomToken) {
            if (p2pBroadcastChannel) return;
            
            // Open a dedicated network tracking channel locked to this specific room token string
            p2pBroadcastChannel = new BroadcastChannel(`quiz_buzzer_mesh_${roomToken}`);
            
            // Listen for data packets coming from other devices on the network space
            p2pBroadcastChannel.onmessage = (event) => {
                const packet = event.data;
                
                if (playerIdentity === "Admin") {
                    // Host Intercept Path: If a player inserts a buzz hit, push log row and re-render
                    if (packet.type === "BUZZ_HIT") {
                        const duplicateCheck = localBuzzerLogsMemory.some(log => log.username === packet.username);
                        if (!duplicateCheck) {
                            localBuzzerLogsMemory.push({
                                username: packet.username,
                                buzzed_at: packet.time
                            });
                            renderLocalLeaderboard();
                            
                            // Broadcast the updated leaderboard back out to update player button states
                            p2pBroadcastChannel.postMessage({
                                type: "SYNC_FEED",
                                currentLogs: localBuzzerLogsMemory
                            });
                        }
                    }
                } else {
                    // Player Intercept Path 1: Host clicked "Reset Board"
                    if (packet.type === "RESET_SIGNAL") {
                        resetPlayerBuzzerButtonLocally();
                    }
                    // Player Intercept Path 2: Host clicked "Close Room"
                    else if (packet.type === "EVICT_SIGNAL") {
                        alert("The Host has closed this local quiz session.");
                        location.reload();
                    }
                    // Player Intercept Path 3: Sync button states dynamically based on leaderboard updates
                    else if (packet.type === "SYNC_FEED") {
                        synchronizeBuzzerLockoutStates(packet.currentLogs);
                    }
                }
            };
        }

        /**
         * Navigation Interface Router & Robust Validation Guard:
         * Runs string validation rules on input fields to guarantee zero empty value crashes.
         */
        function navigateGame(isAdminRole) {
            const roomInput = document.getElementById('room-input');
            const usernameInput = document.getElementById('username-input');

            if (!roomInput || !usernameInput) return;

            const roomVal = roomInput.value.trim().toUpperCase();
            const userVal = usernameInput.value.trim();

            /* STRICT STABILIZATION VALIDATION CHECKS */
            if (!roomVal) {
                return alert("Validation Failure: Room Name input cannot be left empty.");
            }
            if (roomVal.length Waiting for players to buzz...</div>';
                return;
            }

            container.innerHTML = ""; // Wipe status text layout placeholder rows
            localBuzzerLogsMemory.forEach((entry, idx) => {
                const item = document.createElement('div');
                const isFirst = idx === 0;
                
                item.className = `row-entry ${isFirst ? 'winner' : ''}`;
                item.innerHTML = `
                    <div class="row-left">
                        <span class="rank">#${idx + 1}</span>
                        <span>${entry.username}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        ${isFirst ? '<span class="fastest-tag">FASTEST</span>' : ''}
                        <span class="timestamp">${entry.buzzed_at}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        /**
         * Admin Board Reset Command Utility: Wipes active arrays and flushes player lock states.
         */
        function clearBoard() {
            localBuzzerLogsMemory = [];
            renderLocalLeaderboard();
            
            // Send broadcast command to clear all active buttons
            if (p2pBroadcastChannel) {
                p2pBroadcastChannel.postMessage({ type: "RESET_SIGNAL" });
            }
        }

        /**
         * Admin Teardown Utility: Safely closes local wireless channel tunnels.
         */
        function deleteEntireRoom() {
            if(!confirm("Are you sure you want to end this game session? All connected devices will be booted.")) return;
            
            if (p2pBroadcastChannel) {
                p2pBroadcastChannel.postMessage({ type: "EVICT_SIGNAL" });
                p2pBroadcastChannel.close();
            }
            
            location.reload();
        }
    </script>
</body>
</html>
