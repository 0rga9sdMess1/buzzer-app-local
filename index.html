<!DOCTYPE html>
<html lang="en">

<!--
================================================================================
CHANGELOG

Ver.1.0.0.14.05.2026.19.01.00
- Rebuilt stable Supabase architecture
- Added proper session handling
- Added roster synchronization
- Added live multiplayer buzzer sync
- Added leave session cleanup system

Ver.0.9.9.14.05.2026.18.40.00
- Fixed broken session deletion logic
- Fixed duplicate buzz registrations

Ver.0.9.8.14.05.2026.18.20.00
- Improved mobile polling stability

Ver.0.9.7.14.05.2026.17.50.00
- Added admin dashboard redesign

Ver.0.9.6.14.05.2026.17.10.00
- Initial multiplayer buzzer prototype
================================================================================
-->

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Quiz Buzzer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
}

.screen{
    width:100%;
    max-width:430px;
    background:#161616;
    border:1px solid #262626;
    border-radius:24px;
    padding:28px;
    display:none;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.screen.active{
    display:block;
}

h1{
    text-align:center;
    font-size:30px;
    margin-bottom:24px;
    font-weight:800;
}

h1 span{
    color:#ef4444;
}

input{
    width:100%;
    background:#222;
    border:1px solid #333;
    border-radius:12px;
    padding:14px;
    color:white;
    font-size:16px;
    margin-bottom:14px;
}

button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    margin-bottom:12px;
    cursor:pointer;
}

.primary{
    background:white;
    color:black;
}

.secondary{
    background:#222;
    color:#d4d4d4;
    border:1px solid #333;
}

.danger{
    background:#ef4444;
    color:white;
}

.badges{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:22px;
    flex-wrap:wrap;
}

.badge{
    background:#222;
    border:1px solid #333;
    border-radius:20px;
    padding:6px 12px;
    font-size:12px;
}

.buzzer-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    height:260px;
}

.buzzer{
    width:200px;
    height:200px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
    font-weight:800;
}

.red{
    background:#dc2626;
    border-bottom:12px solid #991b1b;
}

.green{
    background:#059669;
    border-bottom:12px solid #047857;
}

.panel{
    background:#1a1a1a;
    border:1px solid #262626;
    border-radius:14px;
    padding:12px;
    max-height:180px;
    overflow:auto;
    margin-top:12px;
}

.row{
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.winner{
    background:rgba(5,150,105,0.15);
    border-color:#059669;
    color:#34d399;
    font-weight:bold;
}

.section{
    font-size:12px;
    color:#999;
    margin-top:12px;
    margin-bottom:8px;
    text-transform:uppercase;
}

.empty{
    text-align:center;
    color:#666;
    padding:20px;
}

.roster{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.roster-item{
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
}

.version{
    position:fixed;
    bottom:8px;
    right:12px;
    font-size:10px;
    color:#555;
    font-family:monospace;
}

</style>

</head>

<body>

<div id="home" class="screen active">

    <h1>QUIZ<span>BUZZER</span></h1>

    <input
        id="username"
        placeholder="Enter Username"
    >

    <button
        class="primary"
        onclick="joinGuest()"
    >
        Join as Guest
    </button>

    <button
        class="secondary"
        onclick="showScreen('password')"
    >
        Host as Admin
    </button>

</div>

<div id="password" class="screen">

    <h1>ADMIN<span>LOCK</span></h1>

    <input
        type="password"
        id="passwordInput"
        placeholder="Enter Password"
    >

    <button
        class="primary"
        onclick="adminLogin()"
    >
        Verify Access
    </button>

    <button
        class="secondary"
        onclick="showScreen('home')"
    >
        Back
    </button>

</div>

<div id="player" class="screen">

    <div class="badges">

        <div class="badge">
            SESSION LIVE
        </div>

        <div class="badge">
            PLAYER:
            <span id="playerName">-</span>
        </div>

    </div>

    <div class="buzzer-wrap">

        <button
            id="buzzBtn"
            class="buzzer red"
            onclick="buzz()"
        >
            PRESS TO BUZZ
        </button>

    </div>

    <button
        class="secondary"
        onclick="leaveSession()"
    >
        Leave Session
    </button>

</div>

<div id="admin" class="screen">

    <h1>HOST PANEL</h1>

    <button
        class="primary"
        onclick="resetBuzzers()"
    >
        Reset Buzzers
    </button>

    <div class="section">
        Buzz Order
    </div>

    <div id="buzzFeed" class="panel">
        <div class="empty">
            Waiting for players...
        </div>
    </div>

    <div class="section">
        Connected Players
    </div>

    <div id="rosterFeed" class="panel">
        <div class="empty">
            No players connected...
        </div>
    </div>

    <button
        class="danger"
        onclick="closeSession()"
        style="margin-top:16px;"
    >
        Close & Delete Session
    </button>

</div>

<div class="version">
Ver.1.0.0.14.05.2026.19.01.00
</div>

<script>

/* =========================
VERSION
========================= */

const APP_VERSION =
"Ver.1.0.0.14.05.2026.19.01.00";

/* =========================
SUPABASE CONFIG
========================= */

const SUPABASE_URL =
"PASTE_YOUR_PROJECT_URL_HERE/rest/v1";

const SUPABASE_KEY =
"PASTE_YOUR_ANON_KEY_HERE";

/* =========================
HEADERS
========================= */

const HEADERS = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type":"application/json",
    Prefer:"return=representation"
};

/* =========================
GLOBALS
========================= */

const clientId = crypto.randomUUID();

let username = "";

let playerLoop = null;
let adminLoop = null;

let canBuzz = true;

/* =========================
SCREEN SWITCH
========================= */

function showScreen(id){

    document
        .querySelectorAll(".screen")
        .forEach(screen=>{
            screen.classList.remove("active");
        });

    document
        .getElementById(id)
        .classList.add("active");
}

/* =========================
ADMIN LOGIN
========================= */

async function adminLogin(){

    const password =
        document
        .getElementById("passwordInput")
        .value
        .trim();

    if(password !== "BlackMirror"){

        alert(
            "Password is incorrect. But Shut Up and Dance anyway!"
        );

        return;
    }

    try{

        await fetch(
            `${SUPABASE_URL}/rooms`,
            {
                method:"POST",
                headers:HEADERS,
                body:JSON.stringify({
                    id:"MASTER_SESSION"
                })
            }
        );

    }catch(e){}

    showScreen("admin");

    refreshAdmin();

    adminLoop =
        setInterval(
            refreshAdmin,
            1000
        );
}

/* =========================
JOIN GUEST
========================= */

async function joinGuest(){

    const input =
        document
        .getElementById("username");

    const name =
        input.value.trim();

    if(!name){

        alert(
            "Please enter username"
        );

        return;
    }

    try{

        const roomResponse =
            await fetch(
                `${SUPABASE_URL}/rooms?id=eq.MASTER_SESSION&select=id`,
                {
                    headers:HEADERS
                }
            );

        const roomData =
            await roomResponse.json();

        if(roomData.length === 0){

            alert(
                "Please wait for the host to start a new session"
            );

            return;
        }

        username = name;

        document
            .getElementById("playerName")
            .innerText = username;

        await fetch(
            `${SUPABASE_URL}/buzzes`,
            {
                method:"POST",
                headers:HEADERS,
                body:JSON.stringify({
                    room_id:"MASTER_SESSION",
                    username:username,
                    client_id:clientId,
                    type:"roster"
                })
            }
        );

        showScreen("player");

        syncPlayer();

        playerLoop =
            setInterval(
                syncPlayer,
                1000
            );

    }catch(err){

        alert(
            "Connection failed"
        );
    }
}

/* =========================
BUZZ
========================= */

async function buzz(){

    if(!canBuzz) return;

    canBuzz = false;

    if(navigator.vibrate){

        navigator.vibrate(100);
    }

    const btn =
        document.getElementById("buzzBtn");

    btn.className =
        "buzzer green";

    btn.innerText =
        "BUZZED!";

    try{

        const existingResponse =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.buzz&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const existingBuzzes =
            await existingResponse.json();

        const alreadyBuzzed =
            existingBuzzes.some(
                item=>
                item.client_id === clientId
            );

        if(!alreadyBuzzed){

            await fetch(
                `${SUPABASE_URL}/buzzes`,
                {
                    method:"POST",
                    headers:HEADERS,
                    body:JSON.stringify({
                        room_id:"MASTER_SESSION",
                        username:username,
                        client_id:clientId,
                        type:"buzz"
                    })
                }
            );
        }

    }catch(e){}
}

/* =========================
PLAYER SYNC
========================= */

async function syncPlayer(){

    try{

        const response =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.buzz&select=username,client_id&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const buzzes =
            await response.json();

        const btn =
            document.getElementById("buzzBtn");

        if(buzzes.length === 0){

            canBuzz = true;

            btn.className =
                "buzzer red";

            btn.innerText =
                "PRESS TO BUZZ";

        }else{

            const winner =
                buzzes[0];

            btn.className =
                "buzzer green";

            if(winner.client_id === clientId){

                btn.innerText =
                    "YOU BUZZED";

            }else{

                btn.innerText =
                    `${winner.username} BUZZED`;
            }
        }

    }catch(e){}
}

/* =========================
ADMIN REFRESH
========================= */

async function refreshAdmin(){

    try{

        /* buzz feed */

        const buzzResponse =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.buzz&select=username,buzzed_at&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const buzzes =
            await buzzResponse.json();

        const buzzFeed =
            document.getElementById("buzzFeed");

        if(buzzes.length === 0){

            buzzFeed.innerHTML =
            `
            <div class="empty">
                Waiting for players...
            </div>
            `;

        }else{

            buzzFeed.innerHTML = "";

            buzzes
            .slice(0,10)
            .forEach((item,index)=>{

                const row =
                    document.createElement("div");

                row.className =
                    `row ${
                        index===0
                        ? "winner"
                        : ""
                    }`;

                row.innerHTML =
                `
                <span>
                    #${index+1}
                    ${item.username}
                </span>

                <span>
                    ${
                        new Date(
                            item.buzzed_at
                        ).toLocaleTimeString()
                    }
                </span>
                `;

                buzzFeed.appendChild(row);

            });
        }

        /* roster */

        const rosterResponse =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.roster&select=username,client_id`,
                {
                    headers:HEADERS
                }
            );

        const roster =
            await rosterResponse.json();

        const rosterFeed =
            document.getElementById("rosterFeed");

        if(roster.length === 0){

            rosterFeed.innerHTML =
            `
            <div class="empty">
                No players connected...
            </div>
            `;

        }else{

            rosterFeed.innerHTML =
            `<div class="roster"></div>`;

            const rosterDiv =
                rosterFeed.querySelector(".roster");

            roster.forEach(player=>{

                const tag =
                    document.createElement("div");

                tag.className =
                    "roster-item";

                tag.innerText =
                    player.username;

                rosterDiv.appendChild(tag);

            });
        }

    }catch(e){}
}

/* =========================
RESET BUZZERS
========================= */

async function resetBuzzers(){

    try{

        await fetch(
            `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.buzz`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

    }catch(e){}
}

/* =========================
LEAVE SESSION
========================= */

async function leaveSession(){

    const confirmLeave =
        confirm(
            "Do you really want to leave this exciting session?"
        );

    if(!confirmLeave) return;

    clearInterval(playerLoop);

    try{

        await fetch(
            `${SUPABASE_URL}/buzzes?client_id=eq.${clientId}`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

    }catch(e){}

    location.reload();
}

/* =========================
CLOSE SESSION
========================= */

async function closeSession(){

    const confirmClose =
        confirm(
            "Are you sure you want to end this session?"
        );

    if(!confirmClose) return;

    clearInterval(adminLoop);

    try{

        await fetch(
            `${SUPABASE_URL}/rooms?id=eq.MASTER_SESSION`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

        await fetch(
            `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

        alert(
            "Session closed"
        );

        location.reload();

    }catch(err){

        alert(
            "Failed to close session"
        );
    }
}

</script>

</body>
</html>
