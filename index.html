<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Quiz Buzzer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow:hidden;
}

.screen{
    width:100%;
    max-width:430px;
    background:#161616;
    border:1px solid #262626;
    border-radius:24px;
    padding:28px;
    display:none;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    animation:fadeIn 0.25s ease;
}

.screen.active{
    display:block;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    font-size:30px;
    margin-bottom:24px;
    font-weight:800;
    letter-spacing:1px;
}

h1 span{
    color:#ef4444;
}

input{
    width:100%;
    background:#222;
    border:1px solid #333;
    border-radius:12px;
    padding:14px;
    color:white;
    font-size:16px;
    margin-bottom:14px;
}

button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    margin-bottom:12px;
    cursor:pointer;
    transition:all 0.15s ease;
}

button:active{
    transform:scale(0.97);
}

.primary{
    background:white;
    color:black;
}

.secondary{
    background:#222;
    color:#d4d4d4;
    border:1px solid #333;
}

.danger{
    background:#ef4444;
    color:white;
}

.badges{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:22px;
    flex-wrap:wrap;
}

.badge{
    background:#222;
    border:1px solid #333;
    border-radius:20px;
    padding:6px 12px;
    font-size:12px;
}

.buzzer-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    height:260px;
}

.buzzer{
    width:210px;
    height:210px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
    font-weight:800;
    transition:all 0.2s ease;
}

.red{
    background:#dc2626;
    border-bottom:12px solid #991b1b;
}

.green{
    background:#059669;
    border-bottom:12px solid #047857;
    box-shadow:0 0 35px rgba(16,185,129,0.6);
}

.panel{
    background:#1a1a1a;
    border:1px solid #262626;
    border-radius:14px;
    padding:12px;
    max-height:180px;
    overflow:auto;
    margin-top:12px;
}

.row{
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.winner{
    background:rgba(5,150,105,0.15);
    border-color:#059669;
    color:#34d399;
    font-weight:bold;
}

.section{
    font-size:12px;
    color:#999;
    margin-top:12px;
    margin-bottom:8px;
    text-transform:uppercase;
}

.empty{
    text-align:center;
    color:#666;
    padding:20px;
}

.roster{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.roster-item{
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
}

.version{
    position:fixed;
    bottom:8px;
    right:12px;
    font-size:10px;
    color:#555;
    font-family:monospace;
}

.brand{
    position:fixed;
    bottom:8px;
    left:12px;
    font-size:10px;
    color:#555;
    font-family:monospace;
}

/* LOADING OVERLAY */

#loadingOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    backdrop-filter:blur(6px);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#loadingOverlay.active{
    display:flex;
}

.loader{
    width:54px;
    height:54px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.15);
    border-top:4px solid #ef4444;
    animation:spin 0.8s linear infinite;
    margin-bottom:18px;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

#loadingText{
    font-size:16px;
    text-align:center;
    max-width:260px;
    line-height:1.5;
}

</style>

</head>

<body>

<div id="loadingOverlay">

    <div class="loader"></div>

    <div id="loadingText">
        Loading...
    </div>

</div>

/* =========================
HELPERS
========================= */

function vibrateShort(){

    if(navigator.vibrate){

        navigator.vibrate(50);
    }
}

function vibrateLong(){

    if(navigator.vibrate){

        navigator.vibrate([120,40,120]);
    }
}

function showLoading(text){

    document
    .getElementById("loadingText")
    .innerText = text;

    document
    .getElementById("loadingOverlay")
    .classList.add("active");
}

function hideLoading(){

    document
    .getElementById("loadingOverlay")
    .classList.remove("active");
}

function delay(ms){

    return new Promise(resolve=>{

        setTimeout(resolve,ms);

    });
}

/* =========================
SAFE SINGLE BUZZ LOGIC
========================= */

let hasBuzzedThisRound = false;

JOIN GUEST FIX
========================= */

/* =========================
SAFE BUZZ
========================= */

async function buzz(){

    if(!canBuzz) return;

    if(hasBuzzedThisRound) return;

    hasBuzzedThisRound = true;

    canBuzz = false;

    vibrateShort();

    const btn =
        document.getElementById("buzzBtn");

    btn.className =
        "buzzer green";

    btn.innerText =
        "BUZZING...";

    try{

        await fetch(
            `${SUPABASE_URL}/buzzes`,
            {
                method:"POST",
                headers:HEADERS,
                body:JSON.stringify({
                    room_id:"MASTER_SESSION",
                    username:username,
                    client_id:clientId,
                    type:"buzz"
                })
            }
        );

    }catch(e){

        hasBuzzedThisRound = false;

        canBuzz = true;
    }
}

/* =========================
RESET FIX
========================= */

async function resetBuzzers(){

    hasBuzzedThisRound = false;

    vibrateLong();

    try{

        await fetch(
            `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.buzz`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

    }catch(e){}
}

/* =========================
PLAYER SYNC FIX
========================= */

async function syncPlayer(){

    try{

        const response =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&type=eq.buzz&select=username,client_id&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const buzzes =
            await response.json();

        const btn =
            document.getElementById("buzzBtn");

        if(buzzes.length === 0){

            hasBuzzedThisRound = false;

            canBuzz = true;

            btn.className =
                "buzzer red";

            btn.innerText =
                "PRESS TO BUZZ";

        }else{

            const winner =
                buzzes[0];

            btn.className =
                "buzzer green";

            if(
                winner.client_id === clientId
            ){

                btn.innerText =
                    "YOU BUZZED FIRST";

            }else{

                btn.innerText =
                    `${winner.username} BUZZED`;
            }
        }

    }catch(e){}
}

</script>
