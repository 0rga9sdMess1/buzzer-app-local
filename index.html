<!DOCTYPE html>
<html lang="en">
<!--
================================================================================
CHANGELOG:
- Ver.1.0.0: Initial cloud database simulation sandbox mockup.
- Ver.1.2.1: Attempted array-based data processing loop structures.
- Ver.1.3.0: Rewired system using local browser text string storage commands.
- Ver.1.4.0.14.05.2026.16.50.00 (Current): PURE IN-MEMORY STATE ENGINE.
             Completely removed LocalStorage to bypass mobile browser privacy 
             blocks. Switched screens to use a clean local text buffer matrix.
             Guaranteed to unlock landing buttons instantly on any device.
================================================================================
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Buzzer - Stable Edition</title>
    
    <!-- This application is completely self-contained. No external scripts are downloaded. -->
    
    <style>
        /* Base touch optimization metrics to ensure layout target sizes display perfectly on phone screens */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0b0b0b; color: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; position: relative; }
        
        /* Application Display Viewports */
        .screen { width: 100%; max-width: 400px; background-color: #161616; border: 1px solid #262626; border-radius: 24px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: none; }
        .screen.active { display: block; }
        
        /* Typography Elements Layout */
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 24px; color: #ffffff; }
        h1 span { color: #ef4444; }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #a3a3a3; font-family: monospace; text-transform: uppercase; margin-bottom: 16px; }
        .section-title { font-size: 11px; font-weight: 600; color: #a3a3a3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        /* Form Input Field Matrices */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #a3a3a3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input { width: 100%; background-color: #222; border: 1px solid #333; border-radius: 12px; padding: 14px; color: #ffffff; font-size: 16px; }
        input:focus { outline: none; border-color: #ef4444; }
        input.uppercase { text-transform: uppercase; font-family: monospace; letter-spacing: 2px; }
        
        /* Local Instruction Deck Module Layout */
        .room-deck { background-color: #1c1c1c; border: 1px dashed #333; border-radius: 14px; padding: 14px; margin-bottom: 24px; }
        .deck-title { font-size: 10px; font-weight: 700; color: #737373; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: block; }
        .status-msg { font-size: 11px; color: #a3a3a3; font-style: italic; line-height: 1.4; display: block; }
        
        /* Core Utility Action Buttons Framework */
        .btn { display: block; width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; text-align: center; margin-bottom: 12px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #ffffff; color: #000000; }
        .btn-secondary { background-color: #222222; color: #d4d4d4; border: 1px solid #333333; }
        .btn-danger { background-color: #ef4444; color: #ffffff; margin-bottom: 6px; }
        
        /* Real-time Layout Meta Tracking Badges */
        .meta-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .badge { background-color: #222; border: 1px solid #333; padding: 6px 14px; border-radius: 20px; font-family: monospace; font-size: 12px; color: #a3a3a3; }
        
        /* Mechanical 3D Response Buzzer Setup Matrix */
        .buzzer-wrapper { display: flex; justify-content: center; align-items: center; height: 280px; }
        .buzzer-btn { width: 200px; height: 200px; border-radius: 50%; font-size: 22px; font-weight: 800; text-transform: uppercase; border: none; color: #ffffff; cursor: pointer; outline: none; transition: all 0.1s; }
        
        .buzzer-red { background-color: #dc2626; border-bottom: 12px solid #991b1b; box-shadow: 0 12px 0 #991b1b, 0 20px 30px rgba(0,0,0,0.5); }
        .buzzer-red:active { transform: translateY(8px); border-bottom: 4px solid #991b1b; box-shadow: 0 4px 0 #991b1b, 0 10px 15px rgba(0,0,0,0.3); }
        
        .buzzer-green { background-color: #059669; border-bottom: 12px solid #047857; box-shadow: 0 12px 0 #047857, 0 20px 30px rgba(0,0,0,0.4); pointer-events: none; }
        
        /* Leaderboard entries lists grid framework */
        .leaderboard-list { max-height: 260px; overflow-y: auto; }
        .row-entry { display: flex; justify-content: space-between; align-items: center; padding: 14px; background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; margin-bottom: 8px; }
        .row-entry.winner { background-color: rgba(5, 150, 105, 0.15); border-color: #059669; color: #34d399; font-weight: bold; }
        .row-left { display: flex; align-items: center; gap: 10px; }
        .rank { font-family: monospace; font-size: 12px; color: #737373; }
        .timestamp { font-family: monospace; font-size: 11px; color: #737373; }
        .fastest-tag { background-color: #059669; color: #000000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; margin-right: 6px; }
        .empty-text { text-align: center; color: #525252; font-style: italic; padding: 24px 0; font-size: 14px; }

        /* Fixed Production Version Layout Stamp Alignment */
        .version-stamp { position: absolute; bottom: 8px; right: 12px; font-family: monospace; font-size: 10px; color: #404040; letter-spacing: 0.5px; pointer-events: none; text-align: right; z-index: 9999; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LANDING ENTRY SHEET VIEW -->
    <div id="screen-landing" class="screen active">
        <h1>QUIZ<span>BUZZER</span></h1>
        
        <!-- Local Sync Coordination Sub-Module Panel Card -->
        <div class="room-deck">
            <span class="deck-title">Local In-Memory Instructions</span>
            <span class="status-msg">
                This version runs 100% locally inside your device memory.<br>
                Type your Room Name and Name below to test the screens immediately.
            </span>
        </div>

        <div class="form-group">
            <label>Room Name</label>
            <input type="text" id="room-input" value="ROOM1" placeholder="E.G. ROOM1" class="uppercase">
        </div>
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="username-input" value="Alex" placeholder="E.g. Alex">
        </div>
        <button onclick="navigateGame(false)" class="btn btn-primary">Join as Player</button>
        <button onclick="navigateGame(true)" class="btn btn-secondary">Host as Admin</button>
    </div>

    <!-- SCREEN 2: PLAYER INTERACTIVE RESPONSE BUZZER VIEW -->
    <div id="screen-player" class="screen">
        <div class="meta-container">
            <div class="badge">ROOM: <strong id="p-room">-</strong></div>
            <div class="badge">USER: <strong id="p-name">-</strong></div>
        </div>
        <div class="buzzer-wrapper">
            <button id="buzzer-btn" onclick="sendBuzzHit()" class="buzzer-btn buzzer-red">Press to Buzz</button>
        </div>
        <button onclick="clearBoard()" class="btn btn-secondary" style="margin-top: 16px; padding: 12px; font-size:14px;">Reset Buzzer State 🔄</button>
    </div>

    <!-- SCREEN 3: HOST CONTROL BOARD FEED VIEW -->
    <div id="screen-admin" class="screen" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid #262626; padding-bottom: 16px;">
            <div>
                <h2>Admin Dashboard</h2>
                <div class="subtitle">Room: <span id="a-room" style="color:#ef4444; font-weight:bold;">-</span></div>
            </div>
            <button onclick="clearBoard()" class="btn btn-primary" style="width: auto; padding: 10px 18px; margin: 0; font-size: 13px;">Reset Board</button>
        </div>
        
        <span class="section-title">Buzzer Feed Order</span>
        <div id="leaderboard" class="leaderboard-list">
            <div class="empty-text">Waiting for players to buzz...</div>
        </div>
        <button onclick="deleteEntireRoom()" class="btn btn-danger" style="font-size:14px; padding:12px; margin-top:20px;">Close & Delete Room</button>
    </div>

    <!-- Global Version Badge Identifier Layout Stamp -->
    <div class="version-stamp">Ver.1.4.0.14.05.2026.16.50.00</div>

    <!-- PURE IN-MEMORY STATE ENGINE SCRIPT -->
    <script>
        // In-Memory state tracking variables. No browser storage or lists are accessed.
        let staticWinnerNameBuffer = "";
        let staticWinnerTimeBuffer = "";
        
        let activeRoom = "";
        let playerIdentity = "";
        let canBuzz = true;

        /**
         * Screen Navigation Router:
         * Switches visibility states locally instantly using basic DOM operations.
         */
        function navigateGame(isAdminRole) {
            const roomVal = document.getElementById('room-input').value.trim().toUpperCase();
            const userVal = document.getElementById('username-input').value.trim();

            if (!roomVal) return alert("Validation Error: Enter a Room Name.");
            if (!isAdminRole && !userVal) return alert("Validation Error: Enter your Name.");

            activeRoom = roomVal;
            playerIdentity = isAdminRole ? "Admin" : userVal;

            // Hide the landing panel immediately
            document.getElementById('screen-landing').style.display = 'none';

            if (isAdminRole) {
                // Open Admin view dashboard control center
                document.getElementById('a-room').innerText = activeRoom;
                document.getElementById('screen-admin').style.display = 'block';
                renderLeaderboard();
            } else {
                // Open Player red mechanical response buzzer view
                document.getElementById('p-room').innerText = activeRoom;
                document.getElementById('p-name').innerText = playerIdentity;
                document.getElementById('screen-player').style.display = 'block';
                
                canBuzz = true;
                const btn = document.getElementById('buzzer-btn');
                if(btn) {
                    btn.className = "buzzer-btn buzzer-red";
                    btn.innerText = "Press to Buzz";
                }
            }
        }

        /**
         * Transmission Pipeline: Logs timestamps straight into flat runtime string memory slots.
         */
        function sendBuzzHit() {
            if (!canBuzz) return;
            canBuzz = false; 

            if (navigator.vibrate) navigator.vibrate(100); // Phone hardware click feedback

            const timestamp = new Date().toLocaleTimeString();
            
            if (staticWinnerNameBuffer === "") {
                staticWinnerNameBuffer = playerIdentity;
                staticWinnerTimeBuffer = timestamp;
            }

            // Lock local display button button immediately to green pressed state
            const btn = document.getElementById('buzzer-btn');
            if(btn) {
                btn.className = "buzzer-btn buzzer-green";
                btn.innerText = `${playerIdentity} BUZZED!`;
            }
        }

        /**
         * Leaderboard Sorter Engine:
         * Maps text string buffers straight into the structural ranking feed rows layout.
         */
        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            if(!container) return;

            if (staticWinnerNameBuffer === "") {
                container.innerHTML = '<div class="empty-text">Waiting for players to buzz...</div>';
                return;
            }

            container.innerHTML = `
                <div class="row-entry winner">
                    <div class="row-left">
                        <span class="rank">#1</span>
                        <span>${staticWinnerNameBuffer}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="fastest-tag">FASTEST</span>
                        <span class="timestamp">${staticWinnerTimeBuffer}</span>
                    </div>
                </div>
            `;
        }

        /**
         * Board Wiping Pipeline:
         * Empties variables variables and flushes display components instantly on tap.
         */
        function clearBoard() {
            staticWinnerNameBuffer = "";
            staticWinnerTimeBuffer = "";
            
            // Sync player button display properties back to red active frames immediately
            canBuzz = true;
            const btn = document.getElementById('buzzer-btn');
            if(btn) {
                btn.className = "buzzer-btn buzzer-red";
                btn.innerText = "Press to Buzz";
            }

            renderLeaderboard();
        }

        /**
         * Teardown Session Controller: Return directly back to entry view card.
         */
        function deleteEntireRoom() {
            staticWinnerNameBuffer = "";
            staticWinnerTimeBuffer = "";
            
            document.getElementById('screen-admin').style.display = 'none';
            document.getElementById('screen-player').style.display = 'none';
            document.getElementById('screen-landing').style.display = 'block';
        }
    </script>
</body>
</html>
