<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Quiz Buzzer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.screen{
    width:100%;
    max-width:430px;
    background:#161616;
    border:1px solid #262626;
    border-radius:24px;
    padding:28px;
    display:none;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.screen.active{
    display:block;
}

h1{
    text-align:center;
    font-size:30px;
    margin-bottom:24px;
    font-weight:800;
}

h1 span{
    color:#ef4444;
}

input{
    width:100%;
    background:#222;
    border:1px solid #333;
    border-radius:12px;
    padding:14px;
    color:white;
    font-size:16px;
    margin-bottom:14px;
}

button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    margin-bottom:12px;
    cursor:pointer;
}

.primary{
    background:white;
    color:black;
}

.secondary{
    background:#222;
    color:#d4d4d4;
    border:1px solid #333;
}

.danger{
    background:#ef4444;
    color:white;
}

.badges{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:22px;
}

.badge{
    background:#222;
    border:1px solid #333;
    border-radius:20px;
    padding:6px 12px;
    font-size:12px;
}

.buzzer-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    height:260px;
}

.buzzer{
    width:200px;
    height:200px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
    font-weight:800;
}

.buzzer.red{
    background:#dc2626;
    border-bottom:12px solid #991b1b;
}

.buzzer.green{
    background:#059669;
    border-bottom:12px solid #047857;
}

.panel{
    background:#1a1a1a;
    border:1px solid #262626;
    border-radius:14px;
    padding:12px;
    max-height:180px;
    overflow:auto;
    margin-top:12px;
}

.row{
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.row.winner{
    background:rgba(5,150,105,0.15);
    border-color:#059669;
    color:#34d399;
    font-weight:bold;
}

.empty{
    text-align:center;
    color:#666;
    padding:20px 0;
}

.section{
    font-size:12px;
    color:#aaa;
    margin-top:12px;
    margin-bottom:8px;
    text-transform:uppercase;
}

.roster{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.roster-item{
    background:#222;
    border:1px solid #333;
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home" class="screen active">

    <h1>QUIZ<span>BUZZER</span></h1>

    <input
        id="username"
        placeholder="Enter Username"
    >

    <button
        class="primary"
        onclick="joinAsGuest()"
    >
        Join as Guest
    </button>

    <button
        class="secondary"
        onclick="showScreen('password')"
    >
        Host as Admin
    </button>

</div>

<!-- PASSWORD -->

<div id="password" class="screen">

    <h1>ADMIN<span>LOCK</span></h1>

    <input
        type="password"
        id="passwordInput"
        placeholder="Enter Password"
    >

    <button
        class="primary"
        onclick="verifyAdminPassword()"
    >
        Verify Access
    </button>

    <button
        class="secondary"
        onclick="showScreen('home')"
    >
        Back
    </button>

</div>

<!-- PLAYER -->

<div id="player" class="screen">

    <div class="badges">

        <div class="badge">
            SESSION: LIVE
        </div>

        <div class="badge">
            PLAYER:
            <span id="playerName">-</span>
        </div>

    </div>

    <div class="buzzer-wrap">

        <button
            id="buzzBtn"
            class="buzzer red"
            onclick="buzz()"
        >
            PRESS TO BUZZ
        </button>

    </div>

</div>

<!-- ADMIN -->

<div id="admin" class="screen">

    <h1>HOST PANEL</h1>

    <button
        class="primary"
        onclick="resetBuzzers()"
    >
        Reset Buzzers
    </button>

    <button
        class="danger"
        onclick="closeSession()"
    >
        Close & Delete Session
    </button>

    <div class="section">
        Buzz Order
    </div>

    <div id="buzzFeed" class="panel">
        <div class="empty">
            Waiting for players...
        </div>
    </div>

    <div class="section">
        Connected Players
    </div>

    <div id="rosterFeed" class="panel">
        <div class="empty">
            No players connected...
        </div>
    </div>

</div>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL =
"https://wfpqmyfhbwqszdzfjvbl.supabase.co/rest/v1";

const SUPABASE_KEY =
"YOUR_ANON_KEY_HERE";

const HEADERS = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`,
    "Content-Type":"application/json",
    Prefer:"return=representation"
};

/* =========================
   GLOBALS
========================= */

let username = "";
let canBuzz = true;

let playerLoop = null;
let adminLoop = null;

/* =========================
   SCREEN SWITCHER
========================= */

function showScreen(id){

    document
        .querySelectorAll(".screen")
        .forEach(screen=>{
            screen.classList.remove("active");
        });

    document
        .getElementById(id)
        .classList.add("active");
}

/* =========================
   ADMIN LOGIN
========================= */

async function verifyAdminPassword(){

    const pass =
        document
        .getElementById("passwordInput")
        .value
        .trim();

    if(pass !== "BlackMirror"){

        alert(
            "Password is incorrect. But Shut Up and Dance anyway!"
        );

        return;
    }

    try{

        /* create session */

        await fetch(
            `${SUPABASE_URL}/rooms`,
            {
                method:"POST",
                headers:HEADERS,
                body:JSON.stringify({
                    id:"MASTER_SESSION"
                })
            }
        );

    }catch(e){}

    showScreen("admin");

    refreshAdmin();

    adminLoop = setInterval(
        refreshAdmin,
        1500
    );
}

/* =========================
   JOIN AS GUEST
========================= */

async function joinAsGuest(){

    const input =
        document
        .getElementById("username");

    const name =
        input.value.trim();

    if(!name){

        alert("Please enter username");

        return;
    }

    if(name.toUpperCase() === "ADMIN"){

        alert("Username ADMIN is reserved");

        return;
    }

    try{

        const roomResponse =
            await fetch(
                `${SUPABASE_URL}/rooms?id=eq.MASTER_SESSION&select=id`,
                {
                    headers:HEADERS
                }
            );

        const roomData =
            await roomResponse.json();

        if(roomData.length === 0){

            alert(
                "Please wait for the host to start a new session"
            );

            return;
        }

        username = name;

        document
            .getElementById("playerName")
            .innerText = username;

        /* add roster entry */

        await fetch(
            `${SUPABASE_URL}/buzzes`,
            {
                method:"POST",
                headers:HEADERS,
                body:JSON.stringify({
                    room_id:"ROSTER",
                    username:username
                })
            }
        );

        showScreen("player");

        syncPlayer();

        playerLoop = setInterval(
            syncPlayer,
            1500
        );

    }catch(err){

        alert(
            "Connection failed"
        );
    }
}

/* =========================
   BUZZ
========================= */

async function buzz(){

    if(!canBuzz) return;

    canBuzz = false;

    if(navigator.vibrate){

        navigator.vibrate(100);
    }

    const btn =
        document.getElementById("buzzBtn");

    btn.className = "buzzer green";

    btn.innerText = "BUZZED!";

    try{

        const response =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const existing =
            await response.json();

        const alreadyBuzzed =
            existing.some(
                item=>item.username === username
            );

        if(!alreadyBuzzed){

            await fetch(
                `${SUPABASE_URL}/buzzes`,
                {
                    method:"POST",
                    headers:HEADERS,
                    body:JSON.stringify({
                        room_id:"MASTER_SESSION",
                        username:username
                    })
                }
            );
        }

    }catch(e){}
}

/* =========================
   PLAYER SYNC
========================= */

async function syncPlayer(){

    try{

        /* session check */

        const sessionCheck =
            await fetch(
                `${SUPABASE_URL}/rooms?id=eq.MASTER_SESSION&select=id`,
                {
                    headers:HEADERS
                }
            );

        const sessionData =
            await sessionCheck.json();

        if(sessionData.length === 0){

            clearInterval(playerLoop);

            alert(
                "Host closed the session"
            );

            location.reload();

            return;
        }

        const response =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&select=username&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const buzzes =
            await response.json();

        const btn =
            document.getElementById("buzzBtn");

        if(buzzes.length === 0){

            canBuzz = true;

            btn.className = "buzzer red";

            btn.innerText =
                "PRESS TO BUZZ";

        }else{

            const winner =
                buzzes[0];

            btn.className =
                "buzzer green";

            if(winner.username === username){

                btn.innerText =
                    "YOU BUZZED";

            }else{

                btn.innerText =
                    `${winner.username} BUZZED`;
            }
        }

    }catch(e){}
}

/* =========================
   ADMIN REFRESH
========================= */

async function refreshAdmin(){

    try{

        /* buzz list */

        const buzzResponse =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION&select=username,buzzed_at&order=buzzed_at.asc`,
                {
                    headers:HEADERS
                }
            );

        const buzzes =
            await buzzResponse.json();

        const feed =
            document.getElementById("buzzFeed");

        if(buzzes.length === 0){

            feed.innerHTML =
                `<div class="empty">
                    Waiting for players...
                </div>`;

        }else{

            feed.innerHTML = "";

            buzzes
                .slice(0,10)
                .forEach((item,index)=>{

                    const row =
                        document.createElement("div");

                    row.className =
                        `row ${
                            index === 0
                            ? "winner"
                            : ""
                        }`;

                    row.innerHTML =
                        `
                        <span>
                            #${index+1}
                            ${item.username}
                        </span>

                        <span>
                            ${
                                new Date(
                                    item.buzzed_at
                                ).toLocaleTimeString()
                            }
                        </span>
                        `;

                    feed.appendChild(row);

                });
        }

        /* roster */

        const rosterResponse =
            await fetch(
                `${SUPABASE_URL}/buzzes?room_id=eq.ROSTER&select=username`,
                {
                    headers:HEADERS
                }
            );

        const roster =
            await rosterResponse.json();

        const rosterFeed =
            document.getElementById("rosterFeed");

        if(roster.length === 0){

            rosterFeed.innerHTML =
                `<div class="empty">
                    No players connected...
                </div>`;

        }else{

            const unique =
                [...new Set(
                    roster.map(
                        p=>p.username
                    )
                )];

            rosterFeed.innerHTML =
                `<div class="roster"></div>`;

            const rosterDiv =
                rosterFeed.querySelector(".roster");

            unique.forEach(player=>{

                const tag =
                    document.createElement("div");

                tag.className =
                    "roster-item";

                tag.innerText =
                    player;

                rosterDiv.appendChild(tag);

            });
        }

    }catch(e){}
}

/* =========================
   RESET BUZZERS
========================= */

async function resetBuzzers(){

    try{

        await fetch(
            `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

    }catch(e){}
}

/* =========================
   CLOSE SESSION
========================= */

async function closeSession(){

    const confirmClose =
        confirm(
            "Are you sure you want to end this session?"
        );

    if(!confirmClose) return;

    clearInterval(adminLoop);

    try{

        await fetch(
            `${SUPABASE_URL}/rooms?id=eq.MASTER_SESSION`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

        await fetch(
            `${SUPABASE_URL}/buzzes?room_id=eq.MASTER_SESSION`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

        await fetch(
            `${SUPABASE_URL}/buzzes?room_id=eq.ROSTER`,
            {
                method:"DELETE",
                headers:HEADERS
            }
        );

        alert(
            "Session closed successfully"
        );

        location.reload();

    }catch(err){

        alert(
            "Failed to close session"
        );
    }
}

</script>

</body>
</html>
