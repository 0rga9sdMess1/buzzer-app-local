<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Realtime Game Buzzer</title>
    <!-- Include Supabase Client Library
    version 1.0.4.15.05.2026.14.10.00-->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-blue: #0070f3;
            --buzzer-active: #ff3b30;
            --buzzer-disabled: #3a3a3c;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 { margin-bottom: 24px; font-weight: 600; }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #eaeaea;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            background: #2c2c2e;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        button:active { opacity: 0.8; }

        /* Screen States */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Giant Buzzer Layout */
        .buzzer-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: var(--buzzer-active);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: 8px solid #ffffff20;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(255, 59, 48, 0.4);
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
        }

        .buzzer-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .buzzer-btn:disabled {
            background-color: var(--buzzer-disabled) !important;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Screen 7: Flash Animation Overlay Effect */
        @keyframes refreshFlash {
            0% { transform: scale(1); filter: brightness(1); }
            30% { transform: scale(0.95); filter: brightness(1.8); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .buzzer-refresh-anim {
            animation: refreshFlash 0.5s ease-in-out;
        }

        /* Existing Pop-up Layout modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            width: 80%;
            max-width: 320px;
            text-align: center;
        }

        /* Transparent Loading Screen Overlay (Black 1.5s Screen) */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .loading-text {
            font-size: 20px;
            font-weight: 500;
            text-align: center;
            margin-top: 24px;
            max-width: 80%;
            line-height: 1.4;
            color: #f2f2f7;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Transparent Loading Screen Overlay Layer -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loadingText" class="loading-text"></div>
    </div>

    <!-- Host session Inactive Modal (Existing Pop-up) -->
    <div id="inactiveModal" class="modal">
        <div class="modal-content">
            <h3>Session Not Live</h3>
            <p style="color:#aaa; font-size:14px; margin-bottom:20px;">The host session has not been initialized yet. Please wait for the host.</p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="container">
        <!-- SCREEN 1: Registration Entry Point Screen -->
        <div id="joinScreen" class="screen active">
            <h2>Game Room Entry</h2>
            <div class="input-group">
                <label for="usernameInput">Username</label>
                <input type="text" id="usernameInput" placeholder="Enter custom name...">
            </div>
            <button onclick="handleJoinAsGuest()">Join as Guest</button>
            <p style="margin: 20px 0 10px 0; color:#666;">or</p>
            <button style="background:#333;" onclick="switchScreen('hostAuthScreen')">Admin Terminal Access</button>
        </div>

        <!-- SCREEN 2: Password Gateway Screen -->
        <div id="hostAuthScreen" class="screen">
            <h2>Admin Gatekeeper</h2>
            <div class="input-group">
                <label for="passwordInput">Secret Security Passcode</label>
                <input type="password" id="passwordInput" placeholder="Enter secure admin key...">
            </div>
            <button onclick="handleHostVerification()">Verify Password</button>
            <button style="background:transparent; color:#888;" onclick="switchScreen('joinScreen')">Back</button>
        </div>

        <!-- SCREEN 3: Active Guest Buzzer Device Console Screen -->
        <div id="guestBuzzerScreen" class="screen">
            <h2 id="guestHeaderTitle">Buzzer Ready</h2>
            <button id="mainBuzzerElement" class="buzzer-btn" onclick="executeGuestBuzzSubmit()">BUZZ</button>
            <p id="buzzerStatusMsg" style="color: #888;">Go ahead, make the first drop!</p>
        </div>

        <!-- SCREEN 4: Centralized Host Dashboard Control Center Screen -->
        <div id="hostDashboardScreen" class="screen">
            <h2>Admin Control Panel</h2>
            <div style="background:#2c2c2e; padding:15px; border-radius:8px; margin-bottom:20px; min-height:120px; text-align:left;">
                <h4 style="margin-top:0; border-bottom:1px solid #444; padding-bottom:5px;">Live Incoming Log Feed:</h4>
                <ol id="buzzerQueueLog" style="padding-left:20px; color:#34c759; font-weight:bold;"></ol>
            </div>
            <button style="background:#ff9500;" onclick="executeAdminBuzzerReset()">Reset Room Buzzers</button>
            <button style="background:transparent; color:#ff3b30;" onclick="location.reload()">Terminate Session</button>
        </div>
    </div>

    <script>
        /**
         * ====================================================================
         * CHANGELOG & VERSION REGISTRY SYSTEM
         * ====================================================================
         * v1.0.0-Alpha  - Baseline structure with core real-time room communication.
         * v1.1.0-Beta   - Enhanced UX states integrating custom loading configurations.
         * v1.2.0-Stable - Resolved duplicate server logs via immediate client state lockout.
         *                 Added adaptive haptic patterns (50ms short / 200ms extended).
         *                 Injected explicit 1500ms transparent loader animations.
         *                 Configured programmatic Audio Synthesis for host feedback loops.
         * ====================================================================
         */

        // --- ENVIRONMENT CONFIGURATION ---
        // Enter your project specific Supabase credentials here for deployment
        const SUPABASE_URL = "https://supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...your-anon-key";
        
        let supabaseClient = null;
        let realtimeChannel = null;
        let globalUsername = "";
        
        // --- LIVE APP RUNTIME STATE FLAGS ---
        let isHostLiveState = false; 
        let userHasBuzzedCurrentRound = false; 

        // Initialize Supabase Client on script loading routine
        if(SUPABASE_URL.indexOf("your-project-id") === -1) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            initializeRealtimePipeline();
        } else {
            console.warn("Supabase Configuration missing! Enter credentials to enable live cross-device sync.");
        }

        // Establish connection mapping via Supabase Broadcast architecture
        function initializeRealtimePipeline() {
            // Define single multi-tenant channel for room syncing
            realtimeChannel = supabaseClient.channel('buzzer-hub', {
                config: { broadcast: { ack: false, self: true } }
            });

            realtimeChannel
                .on('broadcast', { event: 'host-heartbeat-ping' }, () => {
                    isHostLiveState = true;
                })
                .on('broadcast', { event: 'client-buzz-logged' }, (payload) => {
                    appendBuzzToConsoleLog(payload.payload.user);
                })
                .on('broadcast', { event: 'server-buzzer-reset' }, () => {
                    processIncomingResetSignal();
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        // Regularly request network ping to test for presence of active host console
                        setInterval(() => {
                            realtimeChannel.send({ type: 'broadcast', event: 'request-ping-check', payload: {} });
                        }, 2000);
                    }
                });

            // Listen for checks demanding state answers
            realtimeChannel.on('broadcast', { event: 'request-ping-check' }, () => {
                if(document.getElementById('hostDashboardScreen').classList.contains('active')) {
                    realtimeChannel.send({ type: 'broadcast', event: 'host-heartbeat-ping', payload: {} });
                }
            });
        }

        // UI Core Utility Router
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function triggerVibration(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

        function triggerLoaderScreen(text, callback) {
            const overlay = document.getElementById('loadingOverlay');
            const label = document.getElementById('loadingText');
            label.innerText = text;
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                callback();
            }, 1500);
        }

        function closeModal() {
            document.getElementById('inactiveModal').style.display = 'none';
        }

        // --- SPECIFIC OBJECTIVE REQUIREMENTS IMPLEMENTATION ---

        // REQUIREMENT 1 & 2: Click handling routine on Guest Entry Form
        function handleJoinAsGuest() {
            const inputName = document.getElementById('usernameInput').value.trim();
            if(!inputName) {
                alert("Please declare a username before connecting.");
                return;
            }
            globalUsername = inputName;
            document.getElementById('guestHeaderTitle').innerText = `${globalUsername}'s Buzzer`;

            if (isHostLiveState) {
                // Feature 1: Host live action chain
                triggerVibration(50); // Short tactical feedback pulse
                triggerLoaderScreen("Stretch your fingers, sharpen up your brains, let's get buzzing !", () => {
                    switchScreen('guestBuzzerScreen');
                });
            } else {
                // Feature 2: Inactive session chain
                triggerVibration(200); // Protracted execution warning buzz
                document.getElementById('inactiveModal').style.display = 'flex';
            }
        }

        // REQUIREMENT 3 & 4: Host Entry Passcode Verification Control
        function handleHostVerification() {
            const secretPass = document.getElementById('passwordInput').value;
            
            // For testing demonstration, code matches validation string against value "admin123"
            if (secretPass === "admin123") {
                // Feature 3: Validation structural chain match
                triggerVibration(50);
                triggerLoaderScreen("With great power comes great responsibility..", () => {
                    switchScreen('hostDashboardScreen');
                    // Broadcast immediately to listening sessions that host control panel is up
                    if(realtimeChannel) {
                        realtimeChannel.send({ type: 'broadcast', event: 'host-heartbeat-ping', payload: {} });
                    }
                });
            } else {
                // Feature 4: Faulty authentication challenge failure response
                triggerVibration(200);
                alert("Unauthorized credential match rejected. Modal layout maintained.");
            }
        }

        // REQUIREMENT 5: Prevent Duplicate Buzz entries in identical rounds via client-side hard locks
        function executeGuestBuzzSubmit() {
            // Guard clause prevents any second click thread from dispatching events until administrative reset cycles
            if (userHasBuzzedCurrentRound) return;

            // Immediately apply local client-side performance lockdown variables
            userHasBuzzedCurrentRound = true;
            
            const btn = document.getElementById('mainBuzzerElement');
            const infoText = document.getElementById('buzzerStatusMsg');
            
            btn.disabled = true; 
            infoText.innerText = "Locked out! Awaiting host refresh signal...";
            
            // Dispatch message signal payload across pipeline
            if (realtimeChannel) {
                realtimeChannel.send({
                    type: 'broadcast',
                    event: 'client-buzz-logged',
                    payload: { user: globalUsername }
                });
            }
        }

        function appendBuzzToConsoleLog(user) {
            if(!document.getElementById('hostDashboardScreen').classList.contains('active')) return;
            const logList = document.getElementById('buzzerQueueLog');
            const item = document.createElement('li');
            item.innerText = `${user} clicked!`;
            logList.appendChild(item);
        }

        // REQUIREMENT 6: Admin Reset Orchestration
        function executeAdminBuzzerReset() {
            // Feature 6A: Dynamic Procedural Sound Wave Generator (No External Asset Dependancy)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                // Slanted frequency sweep mimicking an instantaneous magical shimmering upward slide
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5 Note
                oscillator.frequency.exponentialRampToValueAtTime(1174.66, audioCtx.currentTime + 0.4); // D6 Note High Sparkle

                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            } catch(e) {
                console.log("Audio API framework contextual exception intercepted: " + e);
            }

            // Feature 6B: Extended admin mechanical device haptics
            triggerVibration(200);

            // Clear admin local tracking visualization feed
            document.getElementById('buzzerQueueLog').innerHTML = "";

            // Dispatch command across broadcast stream pipeline
            if (realtimeChannel) {
                realtimeChannel.send({
                    type: 'broadcast',
                    event: 'server-buzzer-reset',
                    payload: {}
                });
            }
        }

        // REQUIREMENT 7: Guest Target Reset Handlers
        function processIncomingResetSignal() {
            if (!document.getElementById('guestBuzzerScreen').classList.contains('active')) return;

            // Trigger extended haptic feedback on target hardware device layer
            triggerVibration(200);

            const buzzerButton = document.getElementById('mainBuzzerElement');
            const statusLabel = document.getElementById('buzzerStatusMsg');

            // Apply 0.5s visual refresh animation class across UI target layout blocks
            buzzerButton.classList.add('buzzer-refresh-anim');

            setTimeout(() => {
                // Tear down animation block safely
                buzzerButton.classList.remove('buzzer-refresh-anim');

                // Return button to active state
                userHasBuzzedCurrentRound = false;
                buzzerButton.disabled = false;
                statusLabel.innerText = "Buzzer active! Get ready...";
            }, 500);
        }
    </script>
</body>
</html>
