<!DOCTYPE html>
<html lang="en">
<!--
================================================================================
CHANGELOG:
- Ver.1.0.0 - 1.5.3: Array-based multi-room backend execution attempts (Retired).
- Ver.1.6.0.14.05.2026.17.30.00 (Current): Complete structural reboot. Stripped 
             all room complexities. Hardcoded "BlackMirror" password protection, 
             session validation locks, active participant roster tracking, 
             and clean chronological millisecond buzzer indexing up to 10.
================================================================================
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Buzzer - Master Edition</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0b0b0b; color: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; position: relative; }
        
        .screen { width: 100%; max-width: 400px; background-color: #161616; border: 1px solid #262626; border-radius: 24px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: none; }
        .screen.active { display: block; }
        
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 24px; color: #ffffff; }
        h1 span { color: #ef4444; }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #a3a3a3; font-family: monospace; text-transform: uppercase; margin-bottom: 16px; }
        .section-title { font-size: 11px; font-weight: 600; color: #a3a3a3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; margin-top: 12px; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #a3a3a3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input { width: 100%; background-color: #222; border: 1px solid #333; border-radius: 12px; padding: 14px; color: #ffffff; font-size: 16px; }
        input:focus { outline: none; border-color: #ef4444; }
        
        .btn { display: block; width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; text-align: center; margin-bottom: 12px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: #ffffff; color: #000000; }
        .btn-secondary { background-color: #222222; color: #d4d4d4; border: 1px solid #333333; }
        .btn-danger { background-color: #ef4444; color: #ffffff; }
        
        .meta-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .badge { background-color: #222; border: 1px solid #333; padding: 6px 14px; border-radius: 20px; font-family: monospace; font-size: 12px; color: #a3a3a3; }
        
        .buzzer-wrapper { display: flex; justify-content: center; align-items: center; height: 260px; }
        .buzzer-btn { width: 200px; height: 200px; border-radius: 50%; font-size: 22px; font-weight: 800; text-transform: uppercase; border: none; color: #ffffff; cursor: pointer; outline: none; transition: all 0.1s; }
        
        .buzzer-red { background-color: #dc2626; border-bottom: 12px solid #991b1b; box-shadow: 0 12px 0 #991b1b, 0 20px 30px rgba(0,0,0,0.5); }
        .buzzer-red:active { transform: translateY(8px); border-bottom: 4px solid #991b1b; box-shadow: 0 4px 0 #991b1b, 0 10px 15px rgba(0,0,0,0.3); }
        .buzzer-green { background-color: #059669; border-bottom: 12px solid #047857; box-shadow: 0 12px 0 #047857, 0 20px 30px rgba(0,0,0,0.4); pointer-events: none; }
        
        .panel-box { background-color: #1a1a1a; border: 1px solid #262626; border-radius: 14px; padding: 12px; max-height: 160px; overflow-y: auto; margin-bottom: 14px; }
        .row-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background-color: #222; border: 1px solid #333; border-radius: 8px; margin-bottom: 6px; font-size: 14px; }
        .row-entry.winner { background-color: rgba(5, 150, 105, 0.15); border-color: #059669; color: #34d399; font-weight: bold; }
        .fastest-tag { background-color: #059669; color: #000000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; letter-spacing: 1px; margin-right: 6px; }
        .timestamp { font-family: monospace; font-size: 11px; color: #a3a3a3; }
        .empty-text { text-align: center; color: #525252; font-style: italic; padding: 12px 0; font-size: 13px; }
        
        .roster-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .roster-card { background-color: #222; border: 1px solid #333; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #d4d4d4; font-weight: 600; }
        
        .version-stamp { position: absolute; bottom: 8px; right: 12px; font-family: monospace; font-size: 10px; color: #404040; pointer-events: none; text-align: right; z-index: 9999; }
    </style>
</head>
<body>

    <!-- VIEW 1: HOME SHEET CONSOLE -->
    <div id="view-home" class="screen active">
        <h1>QUIZ<span>BUZZER</span></h1>
        <div class="form-group">
            <label>Your Username</label>
            <input type="text" id="username-input" placeholder="E.g. Alex">
        </div>
        <button onclick="navigateGuestJoinFlow()" class="btn btn-primary">Join as Guest</button>
        <button onclick="switchDirectLayoutView('view-password')" class="btn btn-secondary">Host as Admin</button>
    </div>

    <!-- VIEW 2: HARDCODED GATE PASSWORD PANEL -->
    <div id="view-password" class="screen">
        <h1>ADMIN<span>LOCK</span></h1>
        <div class="form-group">
            <label>Enter Master Password</label>
            <input type="password" id="password-input" placeholder="••••••••">
        </div>
        <button onclick="validateAdminSecretPassword()" class="btn btn-primary">Verify Access</button>
        <button onclick="switchDirectLayoutView('view-home')" class="btn btn-secondary">Return to Home</button>
    </div>

    <!-- VIEW 3: GUEST INTERACTIVE RESPONDENT BUZZER CARD -->
    <div id="view-player" class="screen">
        <div class="meta-container">
            <div class="badge">SESSION: <strong style="color:#34d399;">LIVE</strong></div>
            <div class="badge">PLAYER: <strong id="p-name-badge">-</strong></div>
        </div>
        <div class="buzzer-wrapper">
            <button id="buzzer-btn" onclick="executePlayerBuzzHitTransmission()" class="buzzer-btn buzzer-red">Press to Buzz</button>
        </div>
        <button onclick="syncPlayerBuzzerStateWithHostCommand()" class="btn btn-secondary" style="margin-top: 12px; padding: 12px; font-size: 14px;">Sync Buzzer Status 🔄</button>
    </div>

    <!-- VIEW 4: MASTER CONTROL BOARD ADMIN FEED -->
    <div id="view-admin" class="screen" style="max-width: 480px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; border-bottom: 1px solid #262626; padding-bottom: 12px;">
            <div>
                <h2>Host Control Center</h2>
                <div class="subtitle" style="font-size:10px; color:#34d399; font-weight:bold;">Master Session Online</div>
            </div>
            <button onclick="clearMasterLeaderboardFeed()" class="btn btn-primary" style="width: auto; padding: 10px 16px; margin: 0; font-size: 13px;">Reset Board</button>
        </div>
        
        <span class="section-title">Buzzer Feed Order (Max 10 Response Slots)</span>
        <button onclick="refreshAdminDashboardPanelsNatively()" class="btn btn-secondary" style="padding: 10px; font-size: 12px; margin-bottom: 10px; width: 100%;">Refresh Logs Feed 🔄</button>
        <div id="admin-leaderboard-box" class="panel-box">
            <div class="empty-text">Waiting for players to buzz...</div>
        </div>
        
        <span class="section-title">Active Connected Participants Roster</span>
        <div id="admin-roster-box" class="panel-box" style="background-color: #121212;">
            <div class="empty-text">No users active...</div>
        </div>
        
        <button onclick="terminateMasterSession()" class="btn btn-danger" style="font-size: 14px; padding: 12px; margin-top: 12px;">Close & Delete Session</button>
    </div>

    <!-- Rolling Odometer System Sequence Token Stamp -->
    <div class="version-stamp">Ver.1.6.0.14.05.2026.17.30.00</div>

    <!-- NATIVE PARSING MECHANICS CONTROLLER SCRIPT -->
    <script>
        let localPlayerIdentityString = "";

        /**
         * Clean Viewport Router:
         * Switches visibility parameters instantly without hitting storage loop barriers.
         */
        function switchDirectLayoutView(targetViewId) {
            try {
                const views = ['view-home', 'view-password', 'view-player', 'view-admin'];
                views.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.style.display = 'none';
                });
                const target = document.getElementById(targetViewId);
                if(target) target.style.display = 'block';
            } catch(e) { console.error(e); }
        }

        /**
         * Password Validation Interceptor:
         * Enforces strict compliance against hardcoded asset string token variables.
         */
        function validateAdminSecretPassword() {
            const secretInput = document.getElementById('password-input');
            if(!secretInput) return;

            const entryTextString = secretInput.value.trim();

            if (entryTextString === "BlackMirror") {
                // Success path: Write initialization variable to unlock guest logging gates
                localStorage.setItem("quiz_master_session_status", "ACTIVE");
                localStorage.setItem("quiz_master_buzzes_raw", "[]");
                localStorage.setItem("quiz_master_roster_raw", "[]");
                
                secretInput.value = ""; // Clear input field form parameters
                switchDirectLayoutView('view-admin');
                refreshAdminDashboardPanelsNatively();
            } else {
                alert("That is the wrong password , but Shut up and Dance");
            }
        }

        /**
         * Guest Validation Entry Pipeline:
         * Checks the master state slot before allowing players to switch screens.
         */
        function navigateGuestJoinFlow() {
            const userInput = document.getElementById('username-input');
            if(!userInput) return;

            const nameToken = userInput.value.trim();

            if (!nameToken) return alert("Validation Failure: Username field input is required to connect.");
            if (nameToken.toUpperCase() === "ADMIN") return alert("Validation Failure: The username 'Admin' is reserved.");

            const sessionGateStatus = localStorage.getItem("quiz_master_session_status");

            // Structural Access Guard Constraint Check
            if (sessionGateStatus !== "ACTIVE") {
                return alert("Wait for the host to start the buzzing session");
            }

            localPlayerIdentityString = nameToken;
            document.getElementById('p-name-badge').innerText = localPlayerIdentityString;

            // Commit user name into the shared participant cache file row string array
            try {
                let rosterRaw = localStorage.getItem("quiz_master_roster_raw");
                let roster = rosterRaw ? JSON.parse(rosterRaw) : [];
                if (!roster.includes(localPlayerIdentityString)) {
                    roster.push(localPlayerIdentityString);
                    localStorage.setItem("quiz_master_roster_raw", JSON.stringify(roster));
                }
            } catch(e) { console.error(e); }

            switchDirectLayoutView('view-player');
            syncPlayerBuzzerDisplayState();
        }

        /**
         * Transmission Pipeline: Logs name indices down directly inside the data schema rows.
         */
        function executePlayerBuzzHitTransmission() {
            if (!canBuzz) return;

            if (navigator.vibrate) navigator.vibrate(100);

            try {
                let buzzesRaw = localStorage.getItem("quiz_master_buzzes_raw");
                let buzzes = buzzesRaw ? JSON.parse(buzzesRaw) : [];

                // Strict limit cap guard constraint check to lock data input rows to 10 entries maximum
                if (buzzes.length < 10) {
                    const matchCheck = buzzes.some(entry => entry.name === localPlayerIdentityString);
                    if (!matchCheck) {
                        buzzes.push({
                            name: localPlayerIdentityString,
                            time: new Date().toLocaleTimeString()
                        });
                        localStorage.setItem("quiz_master_buzzes_raw", JSON.stringify(buzzes));
                    }
                }
            } catch(e) { console.error(e); }

            canBuzz = false;
            const btn = document.getElementById('buzzer-btn');
            if(btn) {
                btn.className = "buzzer-btn buzzer-green";
                btn.innerText = "BUZZED!";
            }
        }

        /**
         * Dynamic State Sync Controller (Guest View):
         * Reads flat table logs to process color configurations safely.
         */
        function syncPlayerBuzzerStateWithHostCommand() {
            const sessionGateStatus = localStorage.getItem("quiz_master_session_status");
            
            if (sessionGateStatus !== "ACTIVE") {
                alert("The Host has closed this gaming room session.");
                location.reload();
                return;
            }
            syncPlayerBuzzerDisplayState();
        }

        function syncPlayerBuzzerDisplayState() {
            try {
                let buzzesRaw = localStorage.getItem("quiz_master_buzzes_raw");
                let buzzes = buzzesRaw ? JSON.parse(buzzesRaw) : [];
                const btn = document.getElementById('buzzer-btn');
                if(!btn) return;

                if (buzzes.length === 0) {
                    // Board is empty: Revert to red active framework state instantly
                    canBuzz = true;
                    btn.className = "buzzer-btn buzzer-red";
                    btn.innerText = "Press to Buzz";
                } else {
                    // Board has records: Lock out double hits safely and extract winner name properties cleanly
                    canBuzz = false;
                    const absoluteWinnerName = buzzes[0].name;
                    btn.className = "buzzer-btn buzzer-green";
                    btn.innerText = `${absoluteWinnerName} BUZZED!`;
                }
            } catch(e) { console.error(e); }
        }

        /**
         * Admin Dashboard Sync Renderer:
         * Manages millisecond buzzer feeds and lists player rosters natively on tap.
         */
        function refreshAdminDashboardPanelsNatively() {
            try {
                // Panel 1: Chronological millisecond buzzer responses mapping loop
                let buzzesRaw = localStorage.getItem("quiz_master_buzzes_raw");
                let buzzes = buzzesRaw ? JSON.parse(buzzesRaw) : [];
                const leaderboardContainer = document.getElementById('admin-leaderboard-box');
                
                if (leaderboardContainer) {
                    if (buzzes.length === 0) {
                        leaderboardContainer.innerHTML = '<div class="empty-text">Waiting for players to buzz...</div>';
                    } else {
                        leaderboardContainer.innerHTML = "";
                        buzzes.forEach((entry, idx) => {
                            const row = document.createElement('div');
                            const isFirst = idx === 0;
                            row.className = `row-entry ${isFirst ? 'winner' : ''}`;
                            row.innerHTML = `
                                <div class="row-left">
                                    <span class="rank">#${idx + 1}</span>
                                    <span>${entry.name}</span>
                                </div>
                                <div style="display:flex; align-items:center;">
                                    ${isFirst ? '<span class="fastest-tag">FASTEST</span>' : ''}
                                    <span class="timestamp">${entry.time}</span>
                                </div>
                            `;
                            leaderboardContainer.appendChild(row);
                        });
                    }
                }

                // Panel 2: Realtime Active connected participants roster deck template
                let rosterRaw = localStorage.getItem("quiz_master_roster_raw");
                let roster = rosterRaw ? JSON.parse(rosterRaw) : [];
                const rosterContainer = document.getElementById('admin-roster-box');
                
                if (rosterContainer) {
                    if (roster.length === 0) {
                        rosterContainer.innerHTML = '<div class="empty-text">No users active...</div>';
                    } else {
                        rosterContainer.innerHTML = '<div class="roster-grid"></div>';
                        const grid = rosterContainer.querySelector('.roster-grid');
                        roster.forEach(player => {
                            const elementCard = document.createElement('span');
                            elementCard.className = 'roster-card';
                            elementCard.innerText = player;
                            grid.appendChild(elementCard);
                        });
                    }
                }
            } catch(err) { console.error(err); }
        }

        /**
         * Master Admin Board Clear Action Routine: Wipes responses, leaving active players saved.
         */
        function clearMasterLeaderboardFeed() {
            localStorage.setItem("quiz_master_buzzes_raw", "[]");
            refreshAdminDashboardPanelsNatively();
        }

        /**
         * Master Admin Hard Close Teardown Utility: Disconnects everything.
         */
        function terminateMasterSession() {
            if(!confirm("Are you sure you want to end this game session? All guests will be disconnected.")) return;
            localStorage.removeItem("quiz_master_session_status");
            localStorage.removeItem("quiz_master_buzzes_raw");
            localStorage.removeItem("quiz_master_roster_raw");
            location.reload();
        }
    </script>
</body>
</html>
